<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">CanalClear moving cargo vessel</title>
  <desc id="desc">A premium 3D-style cargo vessel in CanalClear navy, cyan, and orange colors cutting through ocean water with wake and spray.</desc>
  <defs>
